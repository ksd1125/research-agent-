<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResearchMethodAgent v4.0</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

  <!-- ===== 헤더 ===== -->
  <header class="hdr">
    <div class="badge">ResearchMethodAgent v4.0 · Gemini 2.5 Flash</div>
    <h1 class="hdr-title">도메인 인지형 에이전트 파이프라인</h1>
    <p class="hdr-sub">문서 맥락 파악 → 맞춤형 통계 분석 → 타겟 결과 재현 코딩 &nbsp;|&nbsp; Google Gemini 2.5 Flash</p>
  </header>

  <!-- ===== 환경 설정 ===== -->
  <section class="card" id="config-card">
    <div class="card-title">환경 설정</div>
    <input type="password" id="api-key" placeholder="Google AI Studio API Key (AIza...) — aistudio.google.com 에서 무료 발급">
    <p class="form-hint">※ 무료 티어: 분당 15회 / 하루 1,500회 · 신용카드 불필요</p>
  </section>

  <!-- ===== 입력 ===== -->
  <section class="card" id="input-card">
    <div class="card-title">분석할 논문 발췌본 입력</div>

    <!-- 탭 -->
    <div class="tab-bar">
      <button class="tab active" id="tab-text">📝 텍스트 붙여넣기 (권장)</button>
      <button class="tab" id="tab-pdf">📄 PDF 업로드</button>
    </div>

    <!-- 텍스트 패널 -->
    <div id="panel-text">
      <textarea id="txt-input" placeholder="여기에 심리학, 경제학, 빅데이터 등의 논문 텍스트를 붙여넣으세요. (에이전트가 도메인을 스스로 파악합니다)"></textarea>
    </div>

    <!-- PDF 패널 -->
    <div id="panel-pdf" style="display:none">
      <div class="upload-area" id="drop-zone">
        <div class="upload-icon">📄</div>
        <div class="upload-title">PDF 클릭 또는 드래그</div>
        <div class="upload-sub">논문 PDF를 업로드하면 자동으로 텍스트를 추출합니다</div>
        <input type="file" id="pdf-file" accept=".pdf" style="display:none">
      </div>
      <div id="pdf-name" class="text-xs text-primary mb-6" style="display:none"></div>
      <div id="pdf-extract-status" class="text-xs text-muted mb-6" style="display:none"></div>
    </div>

    <!-- 상태 메시지 -->
    <div id="status-msg" class="status-msg"></div>

    <!-- 실행 버튼 -->
    <button class="btn-primary" id="run-btn">🚀 도메인 맞춤형 파이프라인 실행</button>
  </section>

  <!-- ===== 로딩 (Enhanced) ===== -->
  <section class="card" id="loading-card" style="display:none">
    <div class="loading-wrap">
      <!-- 에이전트 진행 스텝 -->
      <div class="agent-steps" id="agent-steps">
        <div class="agent-step" id="step-agent1" data-step="1">
          <div class="agent-icon">🔍</div>
          <div class="agent-label">문서 분석</div>
        </div>
        <div class="agent-step" id="step-agent2" data-step="2">
          <div class="agent-icon">📊</div>
          <div class="agent-label">통계 해석</div>
        </div>
        <div class="agent-step" id="step-agent3" data-step="3">
          <div class="agent-icon">💻</div>
          <div class="agent-label">코드 생성</div>
        </div>
        <div class="agent-step" id="step-agent4" data-step="4">
          <div class="agent-icon">🧪</div>
          <div class="agent-label">데이터 생성</div>
        </div>
      </div>
      <!-- 프로그레스 바 -->
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="loading-msg" id="loading-msg">파이프라인 준비 중...</div>
      <div class="loading-tip" id="loading-tip" style="display:none"></div>
    </div>
  </section>

  <!-- ===== 결과 ===== -->
  <div id="result-wrap" class="result-wrap">
    <div class="paper-info">
      <div class="paper-title" id="r-title">—</div>
      <div class="paper-meta" id="r-meta">—</div>
      <div class="context-tags" id="r-context"></div>
    </div>
    <div class="method-nav" id="method-nav"></div>
    <div id="method-blocks"></div>
    <button class="home-link">← 새 논문 분석하기</button>
  </div>

  <!-- ===== JS 모듈 ===== -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
