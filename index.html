<style>

body{font-family:sans-serif;background:#f7f8fa;color:#1a1a1a;padding:1.2rem}

.up-title{font-size:12px;font-weight:500;margin-bottom:2px}

<body>

<div class="hdr">

<script>
var curTab = 'text';
var pdfB64 = null;
var pdfExtractedText = null;

// pdf.js: 샌드박스 환경 — worker 설정 생략, 자동 fake worker 사용

function switchTab(t) {
  curTab = t;
  document.getElementById('tab-text').classList.toggle('on', t==='text');
  document.getElementById('tab-pdf').classList.toggle('on', t==='pdf');
  document.getElementById('panel-text').style.display = (t==='text') ? 'block' : 'none';
  document.getElementById('panel-pdf').style.display = (t==='pdf') ? 'block' : 'none';
}

async function onFileSelect(input) {
  var file = input.files[0];
  if(!file) return;
  pdfExtractedText = null;

  var nameEl = document.getElementById('pdf-name');
  var statusEl = document.getElementById('pdf-extract-status');
  nameEl.style.display = 'block';
  nameEl.textContent = '선택됨: ' + file.name;
  statusEl.style.display = 'block';
  statusEl.textContent = '📖 PDF 텍스트 추출 중...';

  try {
    var arrayBuffer = await file.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
    var totalPages = pdf.numPages;
    var allText = '';

    for(var p = 1; p <= totalPages; p++) {
      statusEl.textContent = `📖 텍스트 추출 중... (${p}/${totalPages} 페이지)`;
      var page = await pdf.getPage(p);
      var content = await page.getTextContent();
      var pageText = content.items.map(function(item){ return item.str; }).join(' ');
      allText += pageText + '\n\n';
    }

    pdfExtractedText = allText.trim();
    statusEl.style.color = '#2e7d32';
    statusEl.textContent = `✅ 추출 완료 — ${totalPages}페이지 / 약 ${Math.round(pdfExtractedText.length/2)}자`;
  } catch(err) {
    statusEl.style.color = '#d32f2f';
    statusEl.textContent = '❌ 텍스트 추출 실패: ' + err.message;
    pdfExtractedText = null;
  }
}

function setStatus(msg, show) {
  var el = document.getElementById('status-msg');
  el.style.display = show ? 'block' : 'none';
  if(show) el.innerHTML = msg;
}

function setLoadingMsg(msg) {
  document.getElementById('loading-msg').innerHTML = msg;
}

function safeParseJSON(raw){
  // 1차 시도: 그대로 파싱
  try { return JSON.parse(raw.trim()); } catch(e){}

  // 2차: 첫 { 부터 마지막 } 까지만 잘라서 파싱 (코드블록 자동 제거 효과)
  var start = raw.indexOf('{');
  var end = raw.lastIndexOf('}');
  if(start >= 0 && end > start){
    var sliced = raw.slice(start, end + 1);
    try { return JSON.parse(sliced); } catch(e){}

    // 3차: 괄호 자동 보정
    var ob = (sliced.match(/\[/g)||[]).length - (sliced.match(/\]/g)||[]).length;
    var oc = (sliced.match(/\{/g)||[]).length - (sliced.match(/\}/g)||[]).length;
    for(var i=0;i<ob;i++) sliced+=']';
    for(var j=0;j<oc;j++) sliced+='}';
    try { return JSON.parse(sliced); } catch(e){}
  }

  throw new Error('JSON 파싱 실패. 원본 응답:\n' + raw.substring(0, 300) + '...');
}

async function callAgentAPI(msgContent, maxTok) {
  var apiKey = document.getElementById('api-key').value.trim();
  if(!apiKey) throw new Error("API 키를 입력해주세요.");

  // msgContent가 배열인 경우 텍스트만 추출 (PDF base64 제외 — Gemini는 별도 처리)
  var prompt = '';
  if(Array.isArray(msgContent)) {
    msgContent.forEach(function(item) {
      if(item.type === 'text') prompt += item.text + '\n';
      else if(item.type === 'document') {
        // PDF는 base64 인라인 지원 (Gemini 1.5+)
        // 텍스트 탭에서는 도달하지 않음
      }
    });
  } else {
    prompt = msgContent;
  }

  var resp = await fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey,
    {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{role: 'user', parts: [{text: prompt}]}],
        generationConfig: {
          temperature: 0.1,
          maxOutputTokens: maxTok || 4000
        }
      })
    }
  );

  var d = await resp.json();
  if(d.error) throw new Error(d.error.message);
  var candidate = d.candidates && d.candidates[0];
  if(!candidate) throw new Error('Gemini 응답이 비어있습니다.');
  return candidate.content.parts.map(p => p.text || '').join('');
}

function promptAgent1() {
  return `당신은 '문서 분석 전문 에이전트'입니다. 반드시 순수 JSON만 출력하세요. \`\`\`json 코드블록, 마크다운, 설명 텍스트를 절대 포함하지 마세요. 첫 글자는 반드시 { 이어야 합니다.
  
  {
    "metadata": {
      "title": "논문 제목", 
      "summary": "1문장 요약"
    },
    "paper_context": {
      "domain": "학문 분야 (예: 심리학, 경제학, 컴퓨터공학 등)",
      "research_type": "연구 형태 (예: 실험연구, 패널분석, 텍스트마이닝 등)",
      "data_characteristics": "사용된 데이터의 구체적 특성 (예: 2x2 피험자 설계, 10년치 패널, 트위터 텍스트 등)"
    },
    "detected_methods": [
      {
        "raw_name": "본문에 언급된 방법론 명칭",
        "evidence_text": "방법론이 언급된 정확한 발췌 문장",
        "target_result_location": "이 분석 결과가 제시된 위치 (예: Table 2, Page 8 등. 텍스트에 없다면 '명시되지 않음')"
      }
    ]
  }`;
}

function promptAgent2(rawName, evidenceText, paperContext) {
  return `당신은 '통계분석 전문 에이전트'입니다. 반드시 순수 JSON만 출력하세요. \`\`\`json 코드블록, 마크다운, 설명 텍스트를 절대 포함하지 마세요. 첫 글자는 반드시 { 이어야 합니다.
  
  [논문 분야]: ${paperContext.domain || '알 수 없음'}
  [데이터 특성]: ${paperContext.data_characteristics || '알 수 없음'}
  [발췌 문장]: "${evidenceText}"
  
  {
    "standard_name": "표준화된 학술적 명칭 (예: OLS Regression)",
    "concept": "이 방법론의 통계적 개념을 위 [논문 분야]의 관점에서 설명 (2~3문장)",
    "why_used": "위 [데이터 특성]을 고려했을 때, 이 논문에서 이 방법을 채택한 학술적 이유",
    "steps": [
      {"step": 1, "name": "단계명", "desc": "구체적 분석/전처리 절차"}
    ]
  }`;
}

function promptAgent3meta(standardName, stepsObj, paperContext, targetLocation) {
  return `당신은 '데이터 프로그래밍 전문 에이전트'입니다. 반드시 순수 JSON만 출력하세요. 첫 글자는 반드시 { 이어야 합니다.

[목표 방법론]: "${standardName}"
[데이터 특성]: "${paperContext.data_characteristics || '일반 데이터'}"

사용할 Python 패키지 목록과 R 패키지 목록만 JSON으로 출력하세요.
{"packages":{"python":["pandas","numpy"],"r":["dplyr","fixest"]}}`;
}

function promptAgent3python(standardName, stepsObj, paperContext, targetLocation) {
  return `당신은 Python 데이터 분석 전문가입니다. 아래 조건에 맞는 Python 코드만 출력하세요. 설명이나 마크다운 없이 코드만 출력하세요.

[방법론]: ${standardName}
[데이터 특성]: ${paperContext.data_characteristics || '일반 데이터'}
[목표 결과물]: ${targetLocation}
[분석 절차]: ${JSON.stringify(stepsObj)}

조건:
1. 위 데이터 특성을 모방한 Mock 데이터 생성 코드를 최상단에 포함
2. 분석 절차에 따라 모델 피팅
3. 마지막 print문은 목표 결과물 형태로 출력`;
}

function promptAgent3r(standardName, stepsObj, paperContext, targetLocation) {
  return `당신은 R 데이터 분석 전문가입니다. 아래 조건에 맞는 R 코드만 출력하세요. 설명이나 마크다운 없이 코드만 출력하세요.

[방법론]: ${standardName}
[데이터 특성]: ${paperContext.data_characteristics || '일반 데이터'}
[목표 결과물]: ${targetLocation}
[분석 절차]: ${JSON.stringify(stepsObj)}

조건:
1. 위 데이터 특성을 모방한 Mock 데이터 생성 코드를 최상단에 포함
2. 분석 절차에 따라 모델 피팅
3. 마지막 print문은 목표 결과물 형태로 출력`;
}

window.runMultiAgentPipeline = async function() {
  var btn = document.getElementById('run-btn');
  var txt = document.getElementById('txt-input').value;
  
  if(!document.getElementById('api-key').value) { setStatus('환경 설정에서 API 키를 입력해주세요.', true); return; }
  if(curTab==='pdf' && !pdfExtractedText) { setStatus('PDF 파일을 선택하고 텍스트 추출이 완료될 때까지 기다려주세요.', true); return; }
  if(curTab==='text' && !txt.trim()) { setStatus('논문 텍스트를 입력해주세요.', true); return; }

  setStatus('', false);
  btn.disabled = true;
  document.getElementById('input-card').style.display = 'none';
  document.getElementById('loading-card').style.display = 'block';

  // PDF 탭이면 추출된 텍스트를 txt로 사용
  var inputText = (curTab === 'pdf') ? pdfExtractedText : txt;

  try {
    setLoadingMsg('<b>[Agent 1: 문서 분석기]</b><br>논문의 학문 분야와 데이터 구조를 파악 중입니다...');
    var c1 = [{type: 'text', text: '논문 텍스트:\n' + inputText}, {type: 'text', text: promptAgent1()}];
    
    var agent1Raw = await callAgentAPI(c1, 2000);
    var docResult;
    try {
      docResult = safeParseJSON(agent1Raw);
    } catch(ae) {
      throw new Error('Agent 1 파싱 실패. Gemini 응답:\n' + agent1Raw.substring(0, 300));
    }
    var pContext = docResult.paper_context || {};
    var methods = docResult.detected_methods || [];
    var finalMethods = [];

    for(var i=0; i<methods.length; i++) {
      var m = methods[i];
      
      setLoadingMsg(`<b>[Agent 2: 통계 분석기]</b> (${i+1}/${methods.length})<br>'${pContext.domain || '해당 분야'}' 관점에서 '${escHtml(m.raw_name)}' 방법론을 해석 중입니다...`);
      var stat2Raw = await callAgentAPI([{type: 'text', text: promptAgent2(m.raw_name, m.evidence_text, pContext)}], 2000);
      var statResult;
      try {
        statResult = safeParseJSON(stat2Raw);
      } catch(se) {
        statResult = {standard_name: m.raw_name, concept: '분석 실패', why_used: '분석 실패', steps: []};
      }
      
      setLoadingMsg(`<b>[Agent 3: 코드 생성기]</b> (${i+1}/${methods.length})<br>패키지 및 Python 코드 생성 중...`);
      var codeResult;
      try {
        // 3-1: 패키지 목록 (JSON)
        var metaRaw = await callAgentAPI([{type:'text', text: promptAgent3meta(statResult.standard_name, statResult.steps, pContext, m.target_result_location)}], 500);
        var metaResult = safeParseJSON(metaRaw);

        // 3-2: Python 코드 (plain text)
        setLoadingMsg(`<b>[Agent 3: 코드 생성기]</b> (${i+1}/${methods.length})<br>Python 코드 작성 중...`);
        var pyRaw = await callAgentAPI([{type:'text', text: promptAgent3python(statResult.standard_name, statResult.steps, pContext, m.target_result_location)}], 8000);
        // 코드블록 안의 내용 추출, 없으면 전체 사용
        var pyMatch = pyRaw.match(/```(?:python)?\s*([\s\S]*?)```/i);
        var pyCode = pyMatch ? pyMatch[1].trim() : pyRaw.replace(/```/g,'').trim();

        // 3-3: R 코드 (plain text)
        setLoadingMsg(`<b>[Agent 3: 코드 생성기]</b> (${i+1}/${methods.length})<br>R 코드 작성 중...`);
        var rRaw = await callAgentAPI([{type:'text', text: promptAgent3r(statResult.standard_name, statResult.steps, pContext, m.target_result_location)}], 8000);
        var rMatch = rRaw.match(/```(?:r|R)?\s*([\s\S]*?)```/i);
        var rCode = rMatch ? rMatch[1].trim() : rRaw.replace(/```/g,'').trim();

        codeResult = {
          packages: metaResult.packages || {python:[], r:[]},
          python_code: pyCode,
          r_code: rCode
        };
      } catch(ce) {
        codeResult = {packages:{python:[],r:[]}, python_code:'# 코드 생성 실패 — 재시도해주세요', r_code:'# 코드 생성 실패 — 재시도해주세요'};
      }

      finalMethods.push({
        raw_name: m.raw_name,
        evidence: m.evidence_text,
        target_location: m.target_result_location,
        standard_name: statResult.standard_name,
        concept: statResult.concept,
        why_used: statResult.why_used,
        steps: statResult.steps,
        packages: codeResult.packages,
        python_code: codeResult.python_code,
        r_code: codeResult.r_code
      });
    }

    docResult.methods = finalMethods;
    renderResult(docResult);

  } catch(e) {
    document.getElementById('loading-card').style.display = 'none';
    document.getElementById('input-card').style.display = 'block';
    btn.disabled = false;
    setStatus('오류 발생: ' + e.message, true);
  }
};

function renderResult(data) {
  document.getElementById('loading-card').style.display = 'none';
  document.getElementById('result-wrap').style.display = 'block';

  var meta = data.metadata || {};
  var ctx = data.paper_context || {};

  document.getElementById('r-title').textContent = meta.title || '제목 미상';
  document.getElementById('r-meta').textContent = meta.summary || '';
  
  var ctxHtml = '';
  if(ctx.domain) ctxHtml += `<div class="ctag">분야: ${escHtml(ctx.domain)}</div>`;
  if(ctx.research_type) ctxHtml += `<div class="ctag">유형: ${escHtml(ctx.research_type)}</div>`;
  if(ctx.data_characteristics) ctxHtml += `<div class="ctag">데이터: ${escHtml(ctx.data_characteristics)}</div>`;
  document.getElementById('r-context').innerHTML = ctxHtml;

  var methods = data.methods || [];
  var nav = document.getElementById('method-nav');
  var blocks = document.getElementById('method-blocks');
  nav.innerHTML = ''; blocks.innerHTML = '';

  for(var i=0; i<methods.length; i++) {
    var m = methods[i];
    
    var nbtn = document.createElement('div');
    nbtn.className = 'mnav-btn' + (i===0?' on':'');
    nbtn.textContent = m.standard_name || m.raw_name;
    nbtn.setAttribute('data-idx', i);
    nbtn.onclick = (function(idx){ return function(){ switchMethod(idx); }; })(i);
    nav.appendChild(nbtn);

    var block = document.createElement('div');
    block.className = 'card method-block' + (i===0?' on':'');
    block.id = 'mblock-'+i;

    var pkgPy = (m.packages?.python||[]).map(p => `<span class="pkg">${p}</span>`).join('');
    var pkgR = (m.packages?.r||[]).map(p => `<span class="pkg">${p}</span>`).join('');
    var stepsHtml = (m.steps||[]).map((s, si) => 
      `<div class="step-item"><div class="step-num">${s.step||si+1}</div><div><div class="step-text"><b>${escHtml(s.name)}</b> — ${escHtml(s.desc)}</div></div></div>`
    ).join('');

    block.innerHTML = `
      <div class="method-header">
        <div class="method-badge">Agent 2 표준화</div>
        <div class="method-name">${escHtml(m.standard_name)} <span style="font-size:11px;color:#888;font-weight:400">(원문: ${escHtml(m.raw_name)})</span></div>
      </div>
      
      <div class="section">
        <div class="section-title">추출 근거 및 목표 (Agent 1)</div>
        <div class="evidence-box">"${escHtml(m.evidence)}"</div>
        <div class="target-box">🎯 <b>목표 재현 위치:</b> ${escHtml(m.target_location)}</div>
      </div>

      <div class="section">
        <div class="section-title">학술적 해석 및 절차 (Agent 2)</div>
        <div class="insight-box" style="margin-bottom:8px"><b>도메인 맞춤 해석:</b><br>${escHtml(m.why_used)}</div>
        <div class="desc-box" style="margin-bottom:8px">${escHtml(m.concept)}</div>
        <div class="step-list">${stepsHtml}</div>
      </div>

      <div class="section">
        <div class="section-title">맞춤형 재현 코드 (Agent 3)</div>
        <div style="margin-bottom:8px;font-size:11px;color:#555">※ ${escHtml(ctx.data_characteristics)} 특성을 반영한 Mock 데이터를 자동 생성합니다.</div>
        <div style="margin-bottom:8px">
          <div style="font-size:10px;color:#666">Python: <div class="pkg-row" style="display:inline-flex">${pkgPy}</div></div>
          <div style="font-size:10px;color:#666;margin-top:4px">R: <div class="pkg-row" style="display:inline-flex">${pkgR}</div></div>
        </div>
        <div class="code-lang">
          <div class="clang on" id="clang-py-${i}" onclick="switchLang(${i},'py')">Python</div>
          <div class="clang" id="clang-r-${i}" onclick="switchLang(${i},'r')">R</div>
        </div>
        <div class="code-wrap">
          <div class="code-block on" id="code-py-${i}">
            <div class="copy-btn" onclick="copyCode('code-py-${i}')">복사</div>
            <pre>${escHtml(m.python_code)}</pre>
          </div>
          <div class="code-block" id="code-r-${i}">
            <div class="copy-btn" onclick="copyCode('code-r-${i}')">복사</div>
            <pre>${escHtml(m.r_code)}</pre>
          </div>
        </div>
      </div>
    `;
    blocks.appendChild(block);
  }
}

function switchMethod(idx){
  document.querySelectorAll('.mnav-btn').forEach(btn => btn.classList.toggle('on', parseInt(btn.getAttribute('data-idx'))===idx));
  document.querySelectorAll('.method-block').forEach(blk => blk.classList.toggle('on', blk.id==='mblock-'+idx));
}
function switchLang(idx,lang){
  document.getElementById('clang-py-'+idx).classList.toggle('on',lang==='py');
  document.getElementById('clang-r-'+idx).classList.toggle('on',lang==='r');
  document.getElementById('code-py-'+idx).classList.toggle('on',lang==='py');
  document.getElementById('code-r-'+idx).classList.toggle('on',lang==='r');
}
function copyCode(id){
  navigator.clipboard.writeText(document.getElementById(id).querySelector('pre').textContent).then(()=>{
    var b = document.getElementById(id).querySelector('.copy-btn'); b.textContent='복사됨!'; setTimeout(()=>b.textContent='복사',1500);
  });
}
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>'); }
function resetAll(){ location.reload(); }
</script>
